<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Floating WhatsApp Button</title>
  <style>
    /* ── Page demo background ── */
   
    .demo-text { text-align: center; }
    .demo-text h2 { font-size: 1.8rem; color: #333; margin-bottom: 8px; }

    /* ── Floating WhatsApp Button ── */
    .whatsapp-float {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Tooltip label */
    .whatsapp-float .wa-label {
      background: #fff;
      color: #128C7E;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 7px 14px;
      border-radius: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.13);
      white-space: nowrap;
      opacity: 0;
      transform: translateX(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      border: 1.5px solid #e0f2ef;
    }

    /* Icon circle */
    .whatsapp-float .wa-btn {
      width: 60px;
      height: 60px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(37,211,102,0.45), 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s ease;
      position: relative;
    }

    /* Pulse ring */
    .whatsapp-float .wa-btn::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid rgba(37,211,102,0.45);
      animation: pulse-ring 2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(0.9); opacity: 0.8; }
      70%  { transform: scale(1.25); opacity: 0; }
      100% { transform: scale(1.25); opacity: 0; }
    }

    /* WhatsApp SVG icon */
    .whatsapp-float .wa-btn svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    /* Hover states */
    .whatsapp-float:hover .wa-btn {
      transform: scale(1.12);
      box-shadow: 0 10px 32px rgba(37,211,102,0.55), 0 2px 10px rgba(0,0,0,0.15);
    }
    .whatsapp-float:hover .wa-label {
      opacity: 1;
      transform: translateX(0);
    }

    /* Entry animation */
    .whatsapp-float {
      animation: float-in 0.6s cubic-bezier(.34,1.56,.64,1) 0.5s both;
    }
    @keyframes float-in {
      from { opacity: 0; transform: translateY(30px) scale(0.8); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

  
  <!-- ✅ FLOATING WHATSAPP BUTTON — change the number below -->
  <a
    class="whatsapp-float"
    href="https://wa.me/919999999999?text=Hello!%20I%20visited%20your%20website."
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Chat with us on WhatsApp"
  >
    <span class="wa-label">Chat with us!</span>

    <span class="wa-btn">
      <!-- Official WhatsApp icon path -->
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16.003 2C8.28 2 2 8.28 2 16.003c0 2.478.659 4.924 1.91 7.076L2 30l7.12-1.874A13.94 13.94 0 0 0 16.003 30C23.72 30 30 23.72 30 16.003 30 8.28 23.72 2 16.003 2zm0 25.44a11.4 11.4 0 0 1-5.796-1.585l-.415-.247-4.227 1.113 1.13-4.13-.27-.427A11.42 11.42 0 0 1 4.56 16.003c0-6.32 5.123-11.44 11.443-11.44 6.318 0 11.44 5.12 11.44 11.44 0 6.32-5.122 11.437-11.44 11.437zm6.27-8.572c-.344-.172-2.035-1.003-2.35-1.117-.317-.115-.547-.172-.777.172-.23.344-.89 1.117-1.09 1.347-.2.23-.4.258-.744.086-.344-.172-1.452-.535-2.766-1.707-1.022-.913-1.712-2.04-1.912-2.384-.2-.344-.022-.53.15-.7.154-.153.344-.4.516-.6.172-.2.23-.344.344-.573.115-.23.058-.43-.028-.6-.087-.172-.778-1.872-1.065-2.565-.28-.673-.565-.582-.778-.593l-.662-.012c-.23 0-.6.086-.914.43-.316.344-1.205 1.175-1.205 2.866s1.234 3.322 1.406 3.552c.172.23 2.427 3.703 5.88 5.193.823.354 1.464.566 1.965.724.825.263 1.578.226 2.172.137.662-.099 2.035-.83 2.322-1.633.286-.8.286-1.49.2-1.634-.085-.143-.315-.229-.66-.4z"/>
      </svg>
    </span>
  </a>

</body>
</html>
